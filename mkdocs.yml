site_name: LLM 学习笔记
site_description: 从原理、数学与实现角度整理语言模型和后训练知识
site_author: kaining-never-stop
site_url: https://kaining-never-stop.github.io/llm-learning-notes/

repo_name: kaining-never-stop/llm-learning-notes
repo_url: https://github.com/kaining-never-stop/llm-learning-notes
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 kaining-never-stop

theme:
  name: material
  language: zh
  logo: assets/images/theme/rem-avatar.webp
  favicon: assets/images/theme/rem-avatar.webp
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

nav:
  - 首页: index.md
  - 从数学讲清后训练:
      - 分类概览: categories/math-post-training.md
      - 在分布视角下理解后训练: post-training/distributional-view.md
      - DPO 为什么隐含 KL 约束: post-training/dpo-implicit-kl.md
  - 后训练基础:
      - 分类概览: categories/post-training-basics.md
      - PyTorch 训练底层与 CausalLM 手撕: post-training-basics/pytorch-training-causallm.md
  - 获取笔记: download.md

plugins:
  - search:
      lang:
        - zh
        - en
  - tags

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
      toc_depth: 2
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/rem-theme-v2.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/rem-theme-v2.css
